name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Login to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build Docker image
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/django-calculator:latest .

      # 4. Push Docker image
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/django-calculator:latest

  supabase-test:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Supabase Health Check
        run: |
          echo "Starting Supabase connection test..."
          
          RESPONSE=$(curl -s -o response.txt -w "%{http_code}" \
          "${{ secrets.SUPABASE_URL }}/rest/v1/" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")

          echo "HTTP Status: $RESPONSE"
          cat response.txt

          if [ "$RESPONSE" -ne 200 ] && [ "$RESPONSE" -ne 401 ]; then
            echo "❌ Supabase connection failed"
            exit 1
          else
            echo "✅ Supabase connection reachable"
          fi