apiVersion: apps/v1
kind: Deployment

metadata:
  name: django-calculator

spec:
  replicas: 3

  selector:
    matchLabels:
      app: calculator

  template:
    metadata:
      labels:
        app: calculator

    spec:
      containers:
      - name: calculator

        image: django-calculator

        imagePullPolicy: Never

        ports:
        - containerPort: 8000