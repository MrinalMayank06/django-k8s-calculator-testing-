<!DOCTYPE html>
<html>
<body>

<h1>Django Calculator</h1>

<form method="post">
{% csrf_token %}

<input type="number" step="any" name="num1">

<select name="op">
<option>+</option>
<option>-</option>
<option>*</option>
<option>/</option>
</select>

<input type="number" step="any" name="num2">

<button type="submit">
Calculate
</button>

</form>

{% if result %}
<h2>Result : {{ result }}</h2>
{% endif %}

</body>
</html>
